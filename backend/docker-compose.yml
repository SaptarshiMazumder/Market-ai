services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: training
      POSTGRES_USER: training
      POSTGRES_PASSWORD: training
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    restart: unless-stopped

  templates:
    build: ./templates
    ports:
      - "5003:5003"
    env_file:
      - ./templates/.env
    volumes:
      - templates-images:/app/template_images
      - templates-data:/app/templates_data.json
    restart: unless-stopped

  generate:
    build: ./generate
    ports:
      - "5008:5008"
    env_file:
      - ./generate/.env
    volumes:
      - generate-output:/app/generated
      - generate-masks:/app/masks
      - generate-inpainted:/app/inpainted
    restart: unless-stopped

volumes:
  postgres-data:
  templates-images:
  templates-data:
  generate-output:
  generate-masks:
  generate-inpainted:
